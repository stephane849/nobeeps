name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        run: npx cap add android || echo "Android platform already exists"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Configure network security
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
            <base-config cleartextTrafficPermitted="true">
              <trust-anchors>
                <certificates src="system"/>
              </trust-anchors>
            </base-config>
          </network-security-config>
          EOF

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mudita-kompakt-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create release on main push
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build ${{ github.run_number }}"
          body: |
            Automated build from commit ${{ github.sha }}

            ## Install
            Download `app-debug.apk` below and install it on your device.
            Enable "Install unknown apps" in Android settings if prompted.

            ## Beeper bridge setup
            1. Install [Beeper](https://www.beeper.com/) on your desktop or server
            2. Open the app → Settings → WhatsApp or Telegram → Connect
            3. Enter your Beeper API endpoint (default: `http://127.0.0.1:23373`)
            4. Scan the QR code with your phone
          files: android/app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
